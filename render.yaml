services:
  - type: web
    name: trading-bot-web
    env: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: trading-bot-db
          property: connectionString
    routes:
      - type: http
        path: /
        priority: 1

  - type: pserv
    name: trading-bot-db
    env: mysql
    plan: free
    ipAllowList: []
    databaseName: trading_bot
    user: trading_bot_user
    postgresDatabaseVersion: "8.0"
